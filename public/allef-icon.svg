  <rect x="70" y="228" width="4" height="4" rx="1" fill="#5B21B6" opacity="0.30"/>

  <!-- Row D -->
  <rect x="12" y="230" width="7" height="7" rx="1" fill="#5B21B6" opacity="0.55"/>
