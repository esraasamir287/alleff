  <rect x="62" y="200" width="8" height="8" rx="1" fill="#6D28D9" opacity="0.85"/>
  <rect x="50" y="206" width="8" height="8" rx="1" fill="#7C3AED" opacity="0.80"/>
  <rect x="72" y="207" width="6" height="6" rx="1" fill="#5B21B6" opacity="0.70"/>
  <rect x="80" y="205" width="5" height="5" rx="1" fill="#F7B731" opacity="0.85"/>

