<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -2 183 264" fill="none">
  <defs>
    <linearGradient id="ag" x1="160" y1="0" x2="20" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#7C3AED"/>
      <stop offset="55%" stopColor="#5B21B6"/>
      <stop offset="100%" stopColor="#3B0DAD"/>
    </linearGradient>
  </defs>

  <!-- Diagonal stroke -->
  <polygon points="48,2 115,2 82,196 15,218" fill="url(#ag)"/>

  <!-- Right vertical stroke -->
